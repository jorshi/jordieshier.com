ogleapis.com"> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <link href="https://fonts.googleapis.com/css2?family=Yantramanav:wght@100;300;400;500;700;900&display=swap" rel="stylesheet"> </head> <body class="fixed-top-nav sticky-bottom-footer"> <div class="external yantramanav-regular"> <div class="container mt-5"> <h1 id="torchdrum">TorchDrum</h1> <p><em>An audio-driven 808 drum synthesizer built with PyTorch and JUCE</em></p> <p>Jordie Shier, Charalampos Saitis, Andrew Robertson, and Andrew McPherson</p> <div align="left"> <a href="https://github.com/jorshi/ddsp-timbre-remap" target="_blank" rel="noopener noreferrer"><i class="fab fa-github"></i> <b>Training Code</b></a> | <a href="https://drive.google.com/file/d/1m-fi_L9U__gK7VpXv2tWOnBkRhUej08r/view?usp=drive_link" target="_blank" rel="noopener noreferrer"><i class="fas fa-headphones"></i> <b>Audio Plugin</b></a> | <a href="https://colab.research.google.com/drive/1nwV5y2eYiCF9YIM1BSmKU9uiPBbw9OxV?usp=sharing" target="_blank" rel="noopener noreferrer"><i class="fas fa-laptop-code"></i> <b>Google Colab</b></a> | <a href="https://arxiv.org/abs/2407.04547" target="_blank" rel="noopener noreferrer"><i class="fas fa-paperclip"></i> <b>Paper</b></a> </div> <hr> <div class="image-container"> <figure> <picture> <source class="responsive-img-srcset" media="(max-width: 480px)" srcset="/assets/img/adc2024/plugin-ui-480.webp"></source> <source class="responsive-img-srcset" media="(max-width: 800px)" srcset="/assets/img/adc2024/plugin-ui-800.webp"></source> <source class="responsive-img-srcset" media="(max-width: 1400px)" srcset="/assets/img/adc2024/plugin-ui-1400.webp"></source> <img src="/assets/img/adc2024/plugin-ui.jpg" class="img-fluid rounded z-depth-1" width="100%" height="auto" title="MLP Parameter Mapping Overview" onerror="this.onerror=null; $('.responsive-img-srcset').remove();"> </picture> </figure> <div class="plus-button" data-info="Audio features are extracted from input audio at detected onsets. These features (visualized in the radar plot) are passed as input to a neural network, which generates modulations for synthesis parmeters." style="top: 12%; left: 37%;">+</div> <div class="plus-button" data-info="The drum synthesizer is modeled on an 808 snare drum. These parameters modify the sound and are modulated by a neural network. The inner ring controls the parameter value outer ring displays the modulation applied by the neural net." style="top: 15%; left: 67%;">+</div> <div class="plus-button" data-info="Onset detection is used to detect percussive events in input audio. The graph shows the amplitude envelope of the input and controls below are used to adjust detection parameters." style="top: 65%; left: 45%;">+</div> <div class="plus-button" data-info="Global controls. Dry/Wet allows for mixing of input audio and the drum synth. 'Neurality' is the strength of the neural network modulation -- zero is no modulation and increasing values lead to more extreme reaction to the input" style="top: 67%; left: 7%;">+</div> <div class="plus-button" data-info="Load a preset and modulation neural network. Neural network models are trained offline to react to input audio and modulate parameters of a preset to match the dynamic and timbral expression of a performance. Train your own models on Google Colab or experiment with pre-trained models." style="top: 5%; left: 2%;">+</div> </div> <div id="info-box" style="display: none;"> <p id="info-content"></p> <button onclick="closeInfo()">Close</button> </div> <p><br></p> <h2 id="what-is-torchdrum">What is TorchDrum?</h2> <iframe width="770" height="440" src="https://www.youtube.com/embed/IVaNfp4rev0?si=_Ja3pAfqm_34z5bH" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen=""></iframe> </div> </div> <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/
